<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=0">
    <title>Global Crypto Cash Mini</title>
    <style>
        /* Base Styling */
        body { 
            background-color: #0b0f1a; 
            color: #ffffff; 
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif; 
            margin: 0; 
            padding: 0; 
            -webkit-font-smoothing: antialiased;
        }
        .app-shell { 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            padding: 20px; 
            min-height: 100vh; 
            box-sizing: border-box; 
        }
        
        h2 { margin-bottom: 25px; font-weight: 700; letter-spacing: -0.5px; color: #fff; }
        h3 { margin-top: 0; font-size: 18px; color: #f8fafc; }

        /* Card Design */
        .main-card { 
            background: #161b2c; 
            border-radius: 20px; 
            padding: 30px 20px; 
            width: 100%; 
            max-width: 380px; 
            margin-bottom: 20px; 
            border: 1px solid #2d334a; 
            text-align: center; 
            box-shadow: 0 10px 25px rgba(0,0,0,0.3); 
        }
        
        /* Balance Section */
        .label { color: #94a3b8; font-size: 11px; font-weight: bold; letter-spacing: 1.5px; margin-bottom: 8px; text-transform: uppercase; }
        .balance { font-size: 50px; font-weight: 800; color: #deff9a; margin: 0; line-height: 1; }
        .currency { color: #4ade80; font-size: 18px; margin-top: 8px; font-weight: 600; }

        /* Buttons */
        .btn { 
            display: block; 
            width: 100%; 
            padding: 16px; 
            border-radius: 12px; 
            border: none; 
            font-size: 15px; 
            font-weight: bold; 
            cursor: pointer; 
            transition: 0.3s; 
            margin-top: 15px; 
            text-transform: uppercase; 
            letter-spacing: 1px; 
        }
        .btn-video { background: linear-gradient(135deg, #f43f5e, #fb7185); color: white; box-shadow: 0 4px 15px rgba(244, 63, 94, 0.3); }
        .btn-video:active { transform: scale(0.98); }
        .btn-pay { background: #fbbf24; color: #000; box-shadow: 0 4px 15px rgba(251, 191, 36, 0.2); }
        .btn-pay:active { transform: scale(0.98); }
        
        /* Inputs */
        input { 
            width: 100%; 
            padding: 14px; 
            margin-bottom: 12px; 
            border-radius: 10px; 
            border: 1px solid #334155; 
            background: #0f172a; 
            color: white; 
            box-sizing: border-box; 
            font-size: 15px; 
            outline: none; 
        }
        input:focus { border-color: #3b82f6; }
        
        /* Tab Controls */
        .tab-content { display: none; width: 100%; max-width: 380px; animation: fadeIn 0.3s ease; }
        .tab-content.active { display: block; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        /* Bottom Nav */
        .nav-bottom { 
            position: fixed; 
            bottom: 0; 
            width: 100%; 
            background: #161b2c; 
            display: flex; 
            justify-content: space-around; 
            padding: 12px 0; 
            border-top: 1px solid #2d334a; 
            z-index: 1000; 
        }
        .nav-btn { 
            background: none; 
            border: none; 
            color: #94a3b8; 
            font-size: 10px; 
            font-weight: bold; 
            cursor: pointer; 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            flex: 1; 
            outline: none;
        }
        .nav-btn.active { color: #3b82f6; }
        .nav-icon { font-size: 20px; margin-bottom: 4px; }

        /* Task Item */
        .task-item { border-bottom: 1px solid #2d334a; padding: 15px 0; text-align: left; }
    </style>
</head>
<body>
     <div id="auth-screen" style="position:fixed; top:0; left:0; width:100%; height:100%; background:#0b0f1a; z-index:9999; display:none; align-items:center; justify-content:center;">
    <div class="main-card">
        <h3 id="auth-title">Account Access</h3>
        <input id="auth-id" placeholder="Enter User ID (For Login)" type="text">
        <input id="auth-pin" placeholder="Enter 4-Digit PIN" type="password" maxlength="4">
        <button class="btn btn-pay" onclick="handleAuth('login')">Login to Account</button>
        <div style="margin: 15px 0; color: #94a3b8; font-size: 12px;">OR</div>
        <button class="btn btn-video" onclick="handleAuth('reg')">Create New Account</button>
        <p style="font-size:11px; color:#f43f5e; margin-top:15px; font-weight: bold;">Note: Save your ID and PIN safely. If lost, account cannot be recovered!</p>
    </div>
</div>           
    <div class="app-shell">
        <h2>Global Crypto Cash Mini</h2>

        <div class="tab-content active" id="home">
            <div class="main-card">
                <div class="label">Available Balance</div>
                <div class="balance" id="display-pts">0</div>
                <div class="currency" id="display-usd">$0.000</div>
            </div>
            <div class="main-card">
                <h3>Daily Rewards</h3>
                <p style="color:#94a3b8; font-size:13px;">Watch a short video ad to earn 10 points instantly.</p>
                <button class="btn btn-video" onclick="handleVideo()">Watch Video (+10 Pts)</button>
            </div>
        </div>

        <div class="tab-content" id="tasks">
            <div class="main-card">
                <h3>CPA Tasks</h3>
                <div id="task-list">Loading tasks...</div>
            </div>
        </div>

        <div class="tab-content" id="payout">
            <div class="main-card">
                <h3>Withdraw (TRC20)</h3>
                <p style="color:#94a3b8; font-size:12px; margin-bottom:15px;">Minimum payout: 5,000 Points</p>
                <input id="wallet-address" placeholder="Enter TRC20 Wallet Address" type="text">
                <input id="payout-amount" placeholder="Enter Points" type="number">
                <button class="btn btn-pay" onclick="handleWithdraw()">Request Payout</button>
            </div>
        </div>

        <div style="height:80px;"></div> </div>

    <div class="nav-bottom">
        <button class="nav-btn active" id="n-home" onclick="showTab('home', 'n-home')"><span class="nav-icon">🏠</span>HOME</button>
        <button class="nav-btn" id="n-task" onclick="showTab('tasks', 'n-task')"><span class="nav-icon">📋</span>TASKS</button>
        <button class="nav-btn" id="n-pay" onclick="showTab('payout', 'n-pay')"><span class="nav-icon">💰</span>PAYOUT</button>
    </div>

    <script>
        // --- CONFIGURATION ---
        const GAS_URL = "https://script.google.com/macros/s/AKfycbwMkMUObrF4Q7QtXMCuHq1d3r19MLY9w9Pf8a8Em9sNMZm97Q0BcjAlgBuruL8IZI4/exec";
        const VIDEO_AD = "YOUR_AD_LINK_HERE"; // বসিয়ে দিন আপনার অ্যাড লিঙ্ক

        // --- USER SYSTEM ---
        let USER_ID = localStorage.getItem('global_uid') || "U" + Math.floor(100000 + Math.random() * 900000);
        localStorage.setItem('global_uid', USER_ID);

        // --- NAVIGATION ---
        function showTab(tabId, btnId) {
            document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
            document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
            document.getElementById(tabId).classList.add('active');
            document.getElementById(btnId).classList.add('active');
        }

        // --- DATA SYNC ---
        function syncData() {
            // Fetch Balance
            fetch(GAS_URL + "?action=login&userId=" + USER_ID)
            .then(res => res.text())
            .then(pts => {
                const points = parseInt(pts) || 0;
                document.getElementById('display-pts').innerText = points;
                document.getElementById('display-usd').innerText = "$" + (points * 0.0004).toFixed(3);
            }).catch(err => console.error("Balance Error:", err));

            // Fetch Tasks
            fetch(GAS_URL + "?action=getOffers")
            .then(res => res.json())
            .then(data => {
                let html = "";
                data.forEach(o => {
                    html += `<div class="task-item">
                        <b style="font-size:15px; color:#fff;">${o.name}</b><br/>
                        <span style="color:#4ade80; font-size:13px;">Reward: +${o.points} Points</span><br/>
                        <button class="btn btn-pay" style="width:auto; padding:8px 15px; font-size:12px; margin-top:8px;" onclick="startTask('${o.id}','${o.link}')">Complete</button>
                    </div>`;
                });
                document.getElementById('task-list').innerHTML = html || "No tasks available at the moment.";
            }).catch(err => {
                document.getElementById('task-list').innerHTML = "Failed to load tasks.";
            });
        }

        // --- ACTIONS ---
        function handleVideo() {
            window.open(VIDEO_AD, "_blank");
            fetch(GAS_URL + "?action=addVideoPoint&userId=" + USER_ID).then(() => {
                alert("Success! 10 Points added to your account.");
                syncData();
            });
        }

        function startTask(tid, tlink) {
            window.open(tlink, "_blank");
            let proof = prompt("Enter your Username/Email as proof of completion:");
            if(proof) {
                fetch(GAS_URL + `?action=submitCPA&userId=${USER_ID}&taskId=${tid}&proof=${encodeURIComponent(proof)}`)
                .then(() => alert("Proof submitted for verification!"));
            }
        }

        function handleWithdraw() {
            let addr = document.getElementById('wallet-address').value;
            let amt = document.getElementById('payout-amount').value;
            let currentBal = parseInt(document.getElementById('display-pts').innerText);

            if (!addr || !amt) {
                alert("Please provide both wallet address and amount!");
                return;
            }
            if (currentBal < 5000) {
                alert("Insufficient balance! Minimum 5,000 points required.");
                return;
            }
            if (parseInt(amt) > currentBal) {
                alert("You cannot withdraw more than your current balance!");
                return;
            }
            if (parseInt(amt) < 5000) {
                alert("Minimum withdrawal is 5,000 points.");
                return;
            }

            fetch(GAS_URL + `?action=withdraw&userId=${USER_ID}&address=${encodeURIComponent(addr)}&amount=${amt}`)
            .then(() => { 
                alert("Withdrawal request sent successfully!"); 
                location.reload(); 
            });
        }

        // Initialize on load
        window.onload = syncData;
    </script>
</body>
</html>
